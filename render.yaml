services:
  - type: web
    name: dingtalk-bot
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: DINGTALK_APP_KEY
        sync: false
      - key: DINGTALK_APP_SECRET
        sync: false
      - key: DINGTALK_CONVERSATION_ID
        sync: false
      - key: OUR_SECTORS
        sync: false
      - key: LLM_BASE_URL
        value: "https://api.longcat.chat/openai/v1"
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL_ID
        value: "LongCat-Flash-Chat"
      - key: API_KEY
        sync: false
      - key: RUN_ON_STARTUP
        value: "true"
